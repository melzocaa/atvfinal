<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrologia Solar</title>
    <link rel="icon" href="https://em-content.zobj.net/source/apple/237/black-sun-with-rays_2600.png" type="image/x-icon" />

    <style>
        /* Importando a fonte Poppins */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color:#fde6f3; 
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #f472b6; 
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.2);
        }

        h1 {
            font-weight: 700;
            color: #be185d;
            margin-bottom: 5px;
            font-size: 28px;
        }

        p.subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 300;
        }

        .input-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        input[type="number"], select {
            padding: 12px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            border: 2px solid #fbcfe8;
            border-radius: 10px;
            background-color: #fff;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus, select:focus {
            border-color: #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.3);
        }

        input[type="number"] {
            width: 80px;
            text-align: center;
        }

        select {
            flex-grow: 1;
            cursor: pointer;
        }

        button {
            background-color: #be185d; 
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(180deg, rgba(253, 242, 248, 0.8) 0%, rgba(255, 255, 255, 0) 100%);
            border-top: 2px solid #f472b6;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .result h2 {
            font-weight: 700;
            color: #be185d;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .result p {
            margin-bottom: 10px;
            line-height: 1.6;
            color: #475569;
        }

        .knight-name {
            font-weight: 600;
            color: #db2777;
            font-size: 18px;
        }

        /* Estilo adicionado para a imagem do cavaleiro */
        .knight-img {
            max-width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid #fbcfe8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Santuário de Atena</h1>
        <p class="subtitle">Descubra qual Cavaleiro de Ouro protege o seu signo</p>

        <div class="input-group">
            <input type="number" id="day" min="1" max="31" placeholder="Dia">
            <select id="month">
                <option value="" disabled selected>Mês</option>
                <option value="1">Janeiro</option>
                <option value="2">Fevereiro</option>
                <option value="3">Março</option>
                <option value="4">Abril</option>
                <option value="5">Maio</option>
                <option value="6">Junho</option>
                <option value="7">Julho</option>
                <option value="8">Agosto</option>
                <option value="9">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
        </div>

        <button onclick="calculateSign()">Despertar o Cosmo</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateSign() {
            const dayInput = document.getElementById('day').value;
            const monthInput = document.getElementById('month').value;
            const resultDiv = document.getElementById('result');

            if (!dayInput || !monthInput) {
                alert('Por favor, insira o dia e selecione o mês do seu nascimento.');
                return;
            }

            const day = parseInt(dayInput);
            const month = parseInt(monthInput);

            if (day < 1 || day > 31) {
                alert('Por favor, insira um dia válido entre 1 e 31.');
                return;
            }

            let sign = '';
            let knight = '';
            let description = '';
            let imageUrl = '';

            if ((month === 3 && day >= 21) || (month === 4 && day <= 19)) {
                sign = 'Áries';
                knight = 'Mu de Áries';
                description = 'Conhecido por ser o restaurador de armaduras e calmo.';
                imageUrl = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQNgmTTEPVSS6UJXCUeu41A59Lh3sB6j4KxKg&s';
            } else if ((month === 4 && day >= 20) || (month === 5 && day <= 20)) {
                sign = 'Touro';
                knight = 'Aldebaran de Touro';
                description = 'Representa força física e estabilidade.';
                imageUrl = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLAYZJmmIMhNSTCD7Nar9yqrTcC5bX4WpYug&s';
            } else if ((month === 5 && day >= 21) || (month === 6 && day <= 20)) {
                sign = 'Gêmeos';
                knight = 'Saga de Gêmeos';
                description = 'Exibe a dualidade entre o bem e o mal.';
                imageUrl = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSFoUZlPO2VTfZJDP05tTCqJeHxMFVaGczRXw&s';
            } else if ((month === 6 && day >= 21) || (month === 7 && day <= 22)) {
                sign = 'Câncer';
                knight = 'Máscara da Morte de Câncer';
                description = 'Conectado ao submundo e forças espirituais.';
                imageUrl = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTk-bF_A8zgJQsDA5N0Bo_tXUf-6zq17kGdWg&s';
            } else if ((month === 7 && day >= 23) || (month === 8 && day <= 22)) {
                sign = 'Leão';
                knight = 'Aiolia de Leão';
                description = 'Nobre, leal e com grande poder de ataque.';
                imageUrl = 'https://ovicio.com.br/wp-content/uploads/2023/05/20230502-ovicio-os-cavaleiros-do-zodiaco-aiolia-de-leao.jpg';
            } else if ((month === 8 && day >= 23) || (month === 9 && day <= 22)) {
                sign = 'Virgem';
                knight = 'Shaka de Virgem';
                description = 'O mais próximo de Deus, reservado e sábio.';
                imageUrl = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTbv5r2oSh_Ttldd9XWlhsdIh8JAvAF6lIDhQ&s';
            } else if ((month === 9 && day >= 23) || (month === 10 && day <= 22)) {
                sign = 'Libra';
                knight = 'Dohko de Libra';
                description = 'O mestre ancião, equilibrado e experiente.';
                imageUrl = 'https://i.pinimg.com/474x/0c/95/0c/0c950c0ec880ff4746200107ee22e8de.jpg';
            } else if ((month === 10 && day >= 23) || (month === 11 && day <= 21)) {
                sign = 'Escorpião';
                knight = 'Milo de Escorpião';
                description = 'Intenso, misterioso e leal.';
                imageUrl = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS3zV77Ttm3jZYSpcLjQoLrq1TOC3cctT0yMA&s';
            } else if ((month === 11 && day >= 22) || (month === 12 && day <= 21)) {
                sign = 'Sagitário';
                knight = 'Aiolos de Sagitário';
                description = 'Corajoso, aventureiro e otimista.';
                imageUrl = 'https://i.pinimg.com/736x/b3/67/c1/b367c1d83f76e325fa2c2ed0fe7bef0a.jpg';
            } else if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) {
                sign = 'Capricórnio';
                knight = 'Shura de Capricórnio';
                description = 'Disciplinado e determinado.';
                imageUrl = 'https://i.pinimg.com/474x/a1/bd/a7/a1bda7964364b99defa162cd48ae8814.jpg';
            } else if ((month === 1 && day >= 20) || (month === 2 && day <= 18)) {
                sign = 'Aquário';
                knight = 'Camus de Aquário';
                description = 'Frio, estoico e racional.';
                imageUrl = 'https://ovicio.com.br/wp-content/uploads/2023/05/20230508-camus-aquario-555x555.png';
            } else if ((month === 2 && day >= 19) || (month === 3 && day <= 20)) {
                sign = 'Peixes';
                knight = 'Afrodite de Peixes';
                description = 'Simboliza a beleza e a morte.';
                imageUrl = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS7yLA3Q58Nk9qP_Rfhg6nYJiO8UeWdnHyIHQ&s';
            }

            // Atualiza a div de resultados incluindo a tag <img>
            resultDiv.innerHTML = `
                <h2>${sign}</h2>
                <p class="knight-name">${knight}</p>
                <p><strong>Perfil:</strong> ${description}</p>
                <img src="${imageUrl}" alt="Imagem de ${knight}" class="knight-img">
            `;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
